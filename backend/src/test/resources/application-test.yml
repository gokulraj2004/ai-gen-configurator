spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:configurator_test}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  jwt:
    secret-key: test-secret-key-that-is-at-least-32-characters-long-for-testing
    access-token-expire-minutes: 30
    refresh-token-expire-days: 7

logging:
  level:
    com.configurator: DEBUG